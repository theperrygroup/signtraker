version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      core:
        patterns: ["requests", "pydantic", "typing-extensions"]
      testing:
        patterns: ["pytest*", "responses"]
      linting:
        patterns: ["black", "flake8", "mypy", "isort", "types-*"]

  - package-ecosystem: pip
    directory: "/docs"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docs:
        patterns: ["mkdocs*", "mkdocstrings*", "pymdown*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
