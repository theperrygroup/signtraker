name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write  # required for PyPI Trusted Publishing (OIDC)

jobs:
  release:
    name: Build, verify, and publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build twine
      - name: Verify version parity
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT_VERSION=$(python -c "import signtraker; print(signtraker.__version__)")
          echo "tag=$TAG_VERSION pyproject=$PYPROJECT_VERSION init=$INIT_VERSION"
          test "$TAG_VERSION" = "$PYPROJECT_VERSION"
          test "$TAG_VERSION" = "$INIT_VERSION"
      - name: Run gates
        run: |
          black --check --line-length=88 .
          isort --check-only --profile=black --line-length=88 .
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          mypy signtraker/ --strict
          pytest -m "not live" --cov=signtraker --cov-report=term-missing
      - name: Build
        run: |
          python -m build
          twine check dist/*
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
