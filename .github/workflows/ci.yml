name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit pip-audit
      - name: Black
        run: black --check --diff --line-length=88 .
      - name: isort
        run: isort --check-only --diff --profile=black --line-length=88 .
      - name: flake8 (errors)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: flake8 (style)
        run: flake8 . --count --max-complexity=10 --max-line-length=88 --statistics
      - name: mypy
        run: mypy signtraker/ --strict
      - name: bandit
        run: bandit -r signtraker/
        continue-on-error: true
      - name: pip-audit
        run: pip-audit
        continue-on-error: true
      - name: Validate pyproject.toml
        run: python -c "import tomllib; tomllib.load(open('pyproject.toml','rb'))"

  test:
    name: Tests (py${{ matrix.python-version }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -m "not live" --cov=signtraker --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Package
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Build and check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
